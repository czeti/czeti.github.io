@startuml
skinparam monochrome true
skinparam defaultFontName Courier
skinparam backgroundColor white

rectangle "Hash Space [0, 2^64)" {
  node "Node A\nhash=0x1A3F" as A
  node "Node B\nhash=0x4C2E" as B
  node "Node C\nhash=0x7B01" as C
  node "Node D\nhash=0xBE44" as D
}

note "Key K maps to the\nfirst node clockwise\nfrom hash(K)" as rule

A -[hidden]- B
B -[hidden]- C
C -[hidden]- D
D -[hidden]- A

@enduml

