" x1="117" x2="527" y1="653.25" y2="653.25"/><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="24" x="129" y="648.1841">ACK</text><!--MD5=[5ca2bd16079468c679a442e406b88923]
@startuml
skinparam monochrome true
skinparam defaultFontName "Courier"

participant Coordinator
participant "Shard 2\n(Account A)" as S2
participant "Shard 7\n(Account B)" as S7

== Phase 1: Prepare ==
Coordinator -> S2 : PREPARE debit(A, 100)
activate S2
note over S2 : Acquire lock on A\nWrite intent to WAL\nDo NOT commit yet
S2 - -> Coordinator : VOTE_COMMIT
deactivate S2

Coordinator -> S7 : PREPARE credit(B, 100)
activate S7
note over S7 : Acquire lock on B\nWrite intent to WAL\nDo NOT commit yet
S7 - -> Coordinator : VOTE_COMMIT
deactivate S7

== Phase 2: Commit ==
note over Coordinator : All votes are COMMIT\nWrite COMMIT to own log

Coordinator -> S2 : COMMIT
activate S2
S2 -> S2 : Apply debit, release lock
S2 - -> Coordinator : ACK
deactivate S2

Coordinator -> S7 : COMMIT
activate S7
S7 -> S7 : Apply credit, release lock
S7 - -> Coordinator : ACK
deactivate S7
@enduml

