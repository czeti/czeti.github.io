@startuml
skinparam monochrome true
skinparam defaultFontName "Courier"
skinparam backgroundColor white

participant Client
participant Router
participant "Shard 0\n[0x0000..0x3FFF]" as S0
participant "Shard 1\n[0x4000..0x7FFF]" as S1
participant "Shard 2\n[0x8000..0xBFFF]" as S2
participant "Shard 3\n[0xC000..0xFFFF]" as S3

Client -> Router : GET key="user:42"
activate Router

note over Router
  hash("user:42") = 0x5A3C
  0x5A3C in [0x4000..0x7FFF]
  route to Shard 1
end note

Router -> S1 : GET "user:42"
activate S1
S1 - -> Router : value
deactivate S1
Router - -> Client : value
deactivate Router

|||

Client -> Router : PUT key="user:99", value=...
activate Router

note over Router
  hash("user:99") = 0xD1F2
  0xD1F2 in [0xC000..0xFFFF]
  route to Shard 3
end note

Router -> S3 : PUT "user:99", value
activate S3
S3 - -> Router : OK
deactivate S3
Router - -> Client : OK
deactivate Router
@enduml

