@startuml
skinparam monochrome true
skinparam defaultFontName "Courier"

[Client Tasks] -right-> [Router\n(stateless)] : Request { key, op }

[Router\n(stateless)] -down-> [Shard Actor 0\nmpsc::channel] : hash(key) % N == 0
[Router\n(stateless)] -down-> [Shard Actor 1\nmpsc::channel] : hash(key) % N == 1
[Router\n(stateless)] -down-> [Shard Actor 2\nmpsc::channel] : hash(key) % N == 2
[Router\n(stateless)] -down-> [Shard Actor 3\nmpsc::channel] : hash(key) % N == 3

[Shard Actor 0\nmpsc::channel] -right-> [State 0\n(unsynchronised)]
[Shard Actor 1\nmpsc::channel] -right-> [State 1\n(unsynchronised)]
[Shard Actor 2\nmpsc::channel] -right-> [State 2\n(unsynchronised)]
[Shard Actor 3\nmpsc::channel] -right-> [State 3\n(unsynchronised)]
@enduml

